            html {
                background-color: #101b17;
                color: #ddd;
            }
            .heading {
                padding: 1px;
                width: 100%;
                text-align: center;
            }
            #stats {
                font-family: Arial, Helvetica, sans-serif;
                border-collapse: collapse;
                width: 100%;
                border-radius: 10px;
            }

            #stats td, #stats th {
                border: 1px solid #ddd;
                padding: 8px;
            }

            #stats tr:nth-child(even){
                background-color: #f2f2f2;
            }

            #stats tr:hover {
                background-color: #007449;
            }

            #stats th {
                padding-top: 12px;
                padding-bottom: 12px;
                text-align: left;
                background-color: #04AA6D;
                color: white;
            }





        </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script>
        var main = function() {
        $("thead").on("click", function() {
            $(this).parents("table").find("tbody").toggle();
        });

        }
        $(document).ready(main);
    </script>
    </head>
    <body>
        <div class="heading">
            <h1>PyStats</h1>
        </div>
        <div class="heading">
            <a href="/yaml">Yaml</a>
            <a href="/json">Json</a>
            <a href="/">all stats</a>
            <a href="/?fast=true">fast</a>
        </div>
        {%- for type_name, type_values in stats.items() %}
        <div>
            <table id="stats">
                {% set title = type_name | capitalize if type_name != "cpu" else type_name | upper %}
                <thead>
                    <tr>
                        <th colspan="2"><h1>{{ title }}</h1></th>
                    </tr>
                </thead>
                <tbody>
                    {%- for key, val in type_values.items() %}
                    <tr>
                        <td>{{ key }}</td>
                        <td>{{ val }}</td>
                    </tr>
                </tbody>
                {%- endfor %}
            </table>
        </div>
        {%- endfor %}
    </body>
