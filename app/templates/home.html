<!DOCTYPE html>
<html>
    <head>
        <title>PyStats</title>
        <link rel="icon" href="favicon.ico">
        <style>
            #stats {
                font-family: Arial, Helvetica, sans-serif;
                border-collapse: collapse;
                width: 100%;
            }
            #stats td {
                border: 1px solid #ddd;
                padding: 5px;
            }
            #stats th {
                border: 1px solid #ddd;
                padding: 0px;
                padding-top: 2px;
                padding-bottom: 2px;
                text-align: center;
                background-color: #04AA6D;
                color: white;
            }
            #stats tr:hover {
                background-color: #007449;
            }
            h1 {
                padding: 0px;
                margin-top: 0;
                margin-bottom: 0;
            }
            a:link, a:visited {
                color: white;
                text-decoration: none;
            }
            a:hover {
                color: #007449;
            }
            html {
                background-color: #101b17;
                color: #ddd;
            }
            .heading {
                padding: 5px;
                width: 100%;
                text-align: center;
            }
        </style>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
        <script>
            var main = function() {
                $("thead").on("click", function() {
                    $(this).parents("table").find("tbody").toggle();
                });
            }
            $(document).ready(main);
        </script>
    </head>
    <body>
        <div class="heading">
            <h1>PyStats</h1>
            <a href="/yaml">Yaml</a> |
            <a href="/json">Json</a> |
            <a href="/">All Stats</a> |
            <a href="/?fast=true">Fast</a>
        </div>
        {%- for type_name, type_values in stats.items() %}
        <div>
            <table id="stats">
                {% set title = type_name | capitalize if type_name != "cpu" else type_name | upper %}
                <thead>
                    <tr>
                        <th colspan="2"><h1>{{ title }}</h1></th>
                    </tr>
                </thead>
                <tbody>
                    {%- for key, val in type_values.items() %}
                    <tr>
                        <td>{{ key }}</td>
                        <td>{{ val }}</td>
                    </tr>
                </tbody>
                {%- endfor %}
            </table>
        </div>
        {%- endfor %}
    </body>
</html>
